name: Nightly Stability

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  stability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Stability gate (restart + jitter + burst)
        run: >
          python scripts/stability_gate.py
          --cycles 30
          --interval 1
          --restart-every 10
          --jitter 0.2
          --burst-every 5
          --burst-size 3
          --max-failures 0
          --max-failure-rate 0.0
  v2-adversarial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: V2 adversarial gate
        run: python run_ezchain_tests.py --groups v2-adversarial --skip-slow
